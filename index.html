<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HazloReal — Únete a la lista de espera</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500;600&display=swap');

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'DM Sans', sans-serif;
  background: #0E0720;
  color: #fff;
  display: flex;
  align-items: center;
  justify-content: center;
  height: 100vh;
}

.container {
  text-align: center;
  max-width: 500px;
  width: 100%;
  padding: 20px;
}

input {
  width: 100%;
  padding: 14px;
  border-radius: 10px;
  border: none;
  margin-bottom: 10px;
  font-size: 16px;
}

button {
  width: 100%;
  padding: 14px;
  border-radius: 10px;
  border: none;
  background: #7C4DFF;
  color: white;
  font-weight: bold;
  cursor: pointer;
}

button:disabled {
  opacity: 0.6;
}

.success {
  display: none;
  margin-top: 20px;
  color: #4ADE80;
}
</style>

</head>

<body>

<div class="container">
  <h1>Únete a la lista de espera</h1>
  <p>Apúntate gratis</p>

  <div id="formWrap">
    <input type="email" id="emailInput" placeholder="tu@email.com">
    <button onclick="handleSubmit()" class="form-btn">Entrar</button>
  </div>

  <div id="successBox" class="success">
    🎉 Ya estás dentro
  </div>
</div>

<script>
async function handleSubmit() {
  const email = document.getElementById('emailInput').value.trim();

  if (!email || !email.includes('@')) {
    alert('Email inválido');
    return;
  }

  const btn = document.querySelector('.form-btn');
  btn.textContent = 'Guardando...';
  btn.disabled = true;

  try {
    await fetch('/api/subscribe', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email }),
    });
  } catch (e) {
    console.log(e);
  }

  document.getElementById('formWrap').style.display = 'none';
  document.getElementById('successBox').style.display = 'block';
}
</script>

</body>
</html>
